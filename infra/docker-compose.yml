name: sui-indexer-local

services:
  postgres:
    image: postgres:16
    env_file:
      - ../.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sui_indexer}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # PLAINTEXT (29092) = Docker-internal (kafka-ui, inter-broker)
      # PLAINTEXT_HOST (9092) = host machine (indexer on localhost:9092)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 6
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  catalog-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.processors
    env_file:
      - ../.env
    environment:
      KAFKA_BROKERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    command: ["catalog-worker"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  swap-normalizer:
    build:
      context: ..
      dockerfile: infra/Dockerfile.processors
    env_file:
      - ../.env
    environment:
      KAFKA_BROKERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    command: ["swap-normalizer"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      catalog-worker:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${TIMESCALE_USER:-postgres}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-postgres}
      POSTGRES_DB: ${TIMESCALE_DB:-sui_metrics}
    ports:
      - "${TIMESCALE_PORT:-5433}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${TIMESCALE_USER:-postgres} -d ${TIMESCALE_DB:-sui_metrics}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  volume-engine:
    build:
      context: ..
      dockerfile: infra/Dockerfile.processors
    env_file:
      - ../.env
    environment:
      KAFKA_BROKERS: kafka:29092
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: "5432"
      TIMESCALE_URL: postgres://postgres:postgres@timescaledb:5432/sui_metrics
      REDIS_URL: redis://redis:6379
    command: ["volume-engine"]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      swap-normalizer:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ohlc-aggregator:
    build:
      context: ..
      dockerfile: infra/Dockerfile.processors
    env_file:
      - ../.env
    environment:
      KAFKA_BROKERS: kafka:29092
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: "5432"
      TIMESCALE_URL: postgres://postgres:postgres@timescaledb:5432/sui_metrics
    command: ["ohlc-aggregator"]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      swap-normalizer:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-service:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: "5432"
      TIMESCALE_URL: postgres://postgres:postgres@timescaledb:5432/sui_metrics
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_URL: http://clickhouse:8123
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
    ports:
      - "${API_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  rolloff-job:
    build:
      context: ..
      dockerfile: infra/Dockerfile.processors
    env_file:
      - ../.env
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: "5432"
      TIMESCALE_URL: postgres://postgres:postgres@timescaledb:5432/sui_metrics
      CLICKHOUSE_URL: http://clickhouse:8123
    command: ["rolloff-job"]
    depends_on:
      timescaledb:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
