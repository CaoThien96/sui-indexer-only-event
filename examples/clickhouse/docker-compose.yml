services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9009:9000"
    env_file:
      - .env
    volumes:
      - ./config.d/storage.xml:/etc/clickhouse-server/config.d/storage.xml:ro
      - clickhouse_hot:/var/lib/clickhouse/hot
      - clickhouse_cold:/var/lib/clickhouse/cold
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  clickhouse_hot:
  clickhouse_cold:
  clickhouse_data:
